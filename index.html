<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#05070d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Perils">
  <title>Perils</title>
  <link rel="manifest" href="manifest.json?v=0.6.0">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css?v=0.6.0">
</head>
<body>
  <canvas id="game"></canvas>
  <button id="mute" aria-label="Toggle sound">🔊</button>

  <!-- HUD (screen-space DOM overlay) -->
  <div id="hud" class="hidden">
    <div id="hud-top">
      <div id="hud-timer">00:00</div>
      <div id="hud-debug"></div>
    </div>
  </div>

  <!-- Level-up choice modal -->
  <div id="levelup" class="hidden"></div>

  <!-- Start menu -->
  <div id="menu">
    <img id="portrait" src="sprites/ace_portrait.png?v=0.6.0" alt="Ace">
    <h1>PERILS</h1>
    <p class="tagline">The ship is lost. Survive until the warp drive charges &mdash; then run.</p>
    <div id="stage-select">
      <button class="stage-btn selected" data-stage="1">I · THE VESSEL</button>
      <button class="stage-btn locked" data-stage="2">II · HELIOS STATION</button>
    </div>
    <button id="start-btn">LAUNCH</button>
    <button id="coop-toggle">CO-OP · LAN (beta)</button>
    <div id="coop-panel" class="hidden">
      <div class="coop-row">
        <button id="coop-host">HOST</button>
        <button id="coop-join">JOIN</button>
      </div>
      <textarea id="coop-out" readonly placeholder="your link code appears here — send it to your partner"></textarea>
      <button id="coop-copy">COPY CODE</button>
      <textarea id="coop-in" placeholder="paste your partner's code here"></textarea>
      <button id="coop-accept">ACCEPT CODE</button>
      <div id="coop-status">two phones, one wifi: HOST on one, JOIN on the other, swap codes</div>
    </div>
    <p id="menu-stats"></p>
    <p class="hint">Move: drag (left) or WASD / arrows &nbsp;·&nbsp; Blink: ⟶ / Space &nbsp;·&nbsp; Special: Q &nbsp;·&nbsp; Ultimate: ⚡ / E</p>
    <p class="version"></p>
  </div>

  <script>const GAME_VERSION = '0.6.0';</script>
  <script src="js/engine.js?v=0.6.0"></script>
  <script src="js/net.js?v=0.6.0"></script>
  <script src="js/sprites.js?v=0.6.0"></script>
  <script src="js/particles.js?v=0.6.0"></script>
  <script src="js/sfx.js?v=0.6.0"></script>
  <script src="js/mapgen.js?v=0.6.0"></script>
  <script src="js/render.js?v=0.6.0"></script>
  <script src="js/entities.js?v=0.6.0"></script>
  <script src="js/weapons.js?v=0.6.0"></script>
  <script src="js/abilities.js?v=0.6.0"></script>
  <script src="js/enemies.js?v=0.6.0"></script>
  <script src="js/upgrades.js?v=0.6.0"></script>
  <script src="js/meta.js?v=0.6.0"></script>
  <script src="js/ui.js?v=0.6.0"></script>
  <script src="js/game.js?v=0.6.0"></script>
</body>
</html>
